<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Department Org Chart — Week 31</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #ECEEF0;
      font-family: 'Inter', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      color: #1C1917;
    }

    /* ── Header ─────────────────────────────── */
    .site-header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(255,255,255,.94);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid #E2E8F0;
    }
    .header-inner {
      padding: 0 40px; height: 60px;
      display: flex; align-items: center; justify-content: space-between; gap: 20px;
    }
    .header-brand { display: flex; align-items: baseline; gap: 12px; }
    .header-brand h1 { font-size: 15px; font-weight: 700; letter-spacing: -.02em; }
    .header-brand p  { font-size: 12px; color: #94A3B8; }
    .week-pill {
      background: #F59E0B; color: #fff;
      padding: 6px 16px; border-radius: 100px;
      font-size: 13px; font-weight: 700; letter-spacing: -.01em;
    }

    /* ── Stats bar ───────────────────────────── */
    .stats-bar { background: #fff; border-bottom: 1px solid #E2E8F0; }
    .stats-inner { display: flex; padding: 0 40px; }
    .stat-item {
      padding: 14px 28px 14px 0; margin-right: 28px;
      border-right: 1px solid #F1F5F9;
    }
    .stat-item:last-child { border-right: none; }
    .stat-item .n { font-size: 22px; font-weight: 800; color: #D97706; letter-spacing: -.03em; }
    .stat-item .l { font-size: 11px; text-transform: uppercase; letter-spacing: .07em; color: #94A3B8; margin-top: 1px; }

    /* ── Main ────────────────────────────────── */
    .main-wrap { padding: 48px 40px 80px; }

    /* ── Team Section ────────────────────────── */
    .team-section { margin-bottom: 72px; }
    .team-section + .team-section { padding-top: 72px; border-top: 2px dashed #D1D5DB; }
    .team-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .1em; color: #94A3B8; margin-bottom: 28px; }

    /* ── Tree ────────────────────────────────── */
    .tree-container { position: relative; overflow-x: auto; overflow-y: visible; padding-bottom: 8px; }
    .tree-inner {
      position: relative;
      display: inline-flex; flex-direction: column; align-items: center;
      min-width: 100%; gap: 0; padding: 4px 20px 20px;
    }
    .tree-svg {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; overflow: visible;
    }

    /* ── Node rows ───────────────────────────── */
    .row-tl      { display: flex; justify-content: center; }
    .row-artists { display: flex; justify-content: center; gap: 8px; margin-top: 44px; flex-wrap: nowrap; }
    .row-games   { display: flex; justify-content: center; gap: 8px; margin-top: 40px; flex-wrap: nowrap; }
    .row-clients { display: flex; justify-content: center; gap: 8px; margin-top: 36px; flex-wrap: nowrap; }

    /* ── Node base ───────────────────────────── */
    .tree-node {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; border-radius: 12px; padding: 10px 12px;
      transition: transform .12s ease, box-shadow .12s ease; cursor: default;
    }
    .tree-node:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(0,0,0,.13); }

    /* Team Lead */
    .node-tl {
      background: #F59E0B; color: #fff;
      width: 260px; min-height: 72px; border-radius: 16px;
      box-shadow: 0 2px 8px rgba(245,158,11,.35);
    }
    .node-tl .node-name { font-size: 16px; font-weight: 700; letter-spacing: -.02em; line-height: 1.2; }
    .node-tl .node-role { font-size: 10px; font-weight: 500; opacity: .75; margin-top: 4px; text-transform: uppercase; letter-spacing: .07em; }

    /* Artist */
    .node-artist {
      background: #FEF3C7; color: #92400E;
      width: 120px; min-height: 46px; border-radius: 10px;
      box-shadow: 0 1px 3px rgba(0,0,0,.07);
    }
    .node-artist .node-name { font-size: 10.5px; font-weight: 600; letter-spacing: -.01em; line-height: 1.3; white-space: normal; word-break: break-word; }

    /* Game */
    .node-game {
      background: #fff; color: #374151;
      width: 120px; min-height: 46px; border-radius: 10px;
      border: 1px solid #E5E7EB;
      box-shadow: 0 1px 3px rgba(0,0,0,.05);
    }
    .node-game .node-name { font-size: 10.5px; font-weight: 600; letter-spacing: -.01em; line-height: 1.3; white-space: normal; word-break: break-word; }

    /* Client */
    .node-client {
      background: #F1F5F9; color: #64748B;
      width: 120px; min-height: 40px; border-radius: 10px;
      border: 1px solid #E2E8F0;
    }
    .node-client .node-name { font-size: 10px; font-weight: 600; letter-spacing: .01em; line-height: 1.3; white-space: normal; word-break: break-word; }

    /* ── Pod sections ────────────────────────── */
    .pod-section {
      margin-bottom: 40px;
      border-radius: 20px;
      border: 1.5px solid #E2E8F0;
      background: #fff;
      box-shadow: 0 4px 28px rgba(0,0,0,.07);
    }
    .pod-header {
      display: flex; align-items: center; gap: 20px;
      padding: 22px 36px;
      background: #FAFAFA;
      border-bottom: 1.5px solid #E2E8F0;
      border-radius: 20px 20px 0 0;
    }
    .pod-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
    .pod-meta { flex: 1; }
    .pod-role {
      font-size: 10px; font-weight: 600; text-transform: uppercase;
      letter-spacing: .1em; color: #94A3B8; display: block; margin-bottom: 3px;
    }
    .pod-name { font-size: 20px; font-weight: 800; letter-spacing: -.03em; }
    .pod-badge {
      padding: 5px 14px; border-radius: 100px;
      font-size: 12px; font-weight: 600;
      color: #fff;
    }
    .pod-teams { padding: 36px 36px 4px; }
    .pod-teams .team-section { margin-bottom: 0; padding-bottom: 52px; }
    .pod-teams .team-section:last-child { padding-bottom: 8px; }
    .pod-teams .team-section + .team-section { padding-top: 52px; border-top: 1.5px dashed #E5E7EB; }

    /* ── Footer ──────────────────────────────── */
    .site-footer {
      border-top: 1px solid #E2E8F0; padding: 20px 40px;
      font-size: 12px; color: #94A3B8; display: flex; align-items: center; gap: 8px;
    }
    .footer-dot { width: 7px; height: 7px; border-radius: 50%; background: #22C55E; }
  </style>
</head>

// ──────────────────────────────────────────────────────────
//  HELPERS  — unique artists / clients per team
// ──────────────────────────────────────────────────────────
function uniqueArtists(team) {
  const out = [], seen = new Set();
  team.games.forEach(g => g.artists.forEach(a => { if (!seen.has(a)) { seen.add(a); out.push(a); } }));
  return out;
}

function uniqueClients(team) {
  const out = [], seen = new Set();
  team.games.forEach(g => { if (!seen.has(g.client)) { seen.add(g.client); out.push(g.client); } });
  return out;
}

// ──────────────────────────────────────────────────────────
//  STATS
// ──────────────────────────────────────────────────────────
function computeStats(data) {
  const artists = new Set(data.flatMap(t => t.games.flatMap(g => g.artists)));
  const games   = new Set(data.flatMap(t => t.games.map(g => g.name)));
  const clients = new Set(data.flatMap(t => t.games.map(g => g.client)).filter(c => c !== '—'));
  return { pods: pods.length, teams: data.length, artists: artists.size, games: games.size, clients: clients.size };
}

function renderStats(data) {
  const s = computeStats(data);
  document.getElementById("header-sub").textContent =
    `${s.pods} Pods · ${s.teams} Teams · ${s.artists} Artists · ${s.games} Games · ${s.clients} Clients`;
  document.getElementById("stats-inner").innerHTML = [
    ["Pods",    s.pods],
    ["Teams",   s.teams],
    ["Artists", s.artists],
    ["Games",   s.games],
    ["Clients", s.clients],
  ].map(([l, n]) => `
    <div class="stat-item">
      <div class="n">${n}</div><div class="l">${l}</div>
    </div>`).join("");
}

}

// ──────────────────────────────────────────────────────────
//  SVG CONNECTORS
// ──────────────────────────────────────────────────────────
const LINE_COLOR = "#CBD5E1";
const LINE_W     = "2";
const ARR        = 6;

function ns(tag) { return document.createElementNS("http://www.w3.org/2000/svg", tag); }

function ctr(el, base) {
  const r = el.getBoundingClientRect(), b = base.getBoundingClientRect();
  return {
    cx:     r.left - b.left + r.width  / 2,
    top:    r.top  - b.top,
    bottom: r.bottom - b.top,
  };
}

function addPath(svg, d) {
  const p = ns("path");
  p.setAttribute("d", d);
  p.setAttribute("stroke", LINE_COLOR);
  p.setAttribute("stroke-width", LINE_W);
  p.setAttribute("fill", "none");
  p.setAttribute("stroke-linecap", "round");
  svg.appendChild(p);
}

function addArrow(svg, x, y) {
  const poly = ns("polygon");
  poly.setAttribute("points", `${x},${y} ${x - ARR/2},${y - ARR} ${x + ARR/2},${y - ARR}`);
  poly.setAttribute("fill", LINE_COLOR);
  svg.appendChild(poly);
}

function drawConnectors(team) {
  const tid  = team.id;
  const base = document.getElementById(`tree-${tid}`);
  const svg  = document.getElementById(`svg-${tid}`);
  svg.setAttribute("width",  base.offsetWidth);
  svg.setAttribute("height", base.offsetHeight);

  const artists = uniqueArtists(team);
  const clients = uniqueClients(team);
  if (!artists.length) return;

  const tl   = ctr(document.getElementById(`tl-${tid}`), base);
  const aPos = artists.map((_, i) => ctr(document.getElementById(`a-${tid}-${i}`), base));
  const gPos = team.games.map((_, i) => ctr(document.getElementById(`g-${tid}-${i}`), base));
  const cPos = clients.map((_, i) => ctr(document.getElementById(`c-${tid}-${i}`), base));
  const artistIdx = new Map(artists.map((a, i) => [a, i]));
  const clientIdx = new Map(clients.map((c, i) => [c, i]));

  // ── TL → T-bus → artists ──
  const busY = tl.bottom + (aPos[0].top - tl.bottom) / 2;
  addPath(svg, `M ${tl.cx} ${tl.bottom} L ${tl.cx} ${busY}`);
  if (aPos.length > 1) addPath(svg, `M ${aPos[0].cx} ${busY} L ${aPos[aPos.length-1].cx} ${busY}`);
  aPos.forEach(ap => { addPath(svg, `M ${ap.cx} ${busY} L ${ap.cx} ${ap.top}`); addArrow(svg, ap.cx, ap.top); });

  // ── Artists → games (one line per artist-game pair; one arrowhead per game) ──
  team.games.forEach((game, gi) => {
    const gp = gPos[gi];
    game.artists.forEach(a => {
      const ai = artistIdx.get(a);
      if (ai == null) return;
      addPath(svg, `M ${aPos[ai].cx} ${aPos[ai].bottom} L ${gp.cx} ${gp.top}`);
    });
    addArrow(svg, gp.cx, gp.top);
  });

  // ── Games → clients (one line per game; one arrowhead per client) ──
  team.games.forEach((game, gi) => {
    const ci = clientIdx.get(game.client);
    if (ci == null) return;
    addPath(svg, `M ${gPos[gi].cx} ${gPos[gi].bottom} L ${cPos[ci].cx} ${cPos[ci].top}`);
  });
  cPos.forEach(cp => addArrow(svg, cp.cx, cp.top));
}

// ──────────────────────────────────────────────────────────
//  INIT
// ──────────────────────────────────────────────────────────
renderAll(orgData);

requestAnimationFrame(() => {
  orgData.forEach(drawConnectors);
});

window.addEventListener("resize", () => {
  orgData.forEach(t => { const s = document.getElementById(`svg-${t.id}`); if (s) s.innerHTML = ""; });
  orgData.forEach(drawConnectors);
});
</script>
</body>
</html>
