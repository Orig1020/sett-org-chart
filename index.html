<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Department Org Chart — Week 31</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #ECEEF0;
      font-family: 'Inter', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      color: #1C1917;
    }

    /* ── Header ─────────────────────────────── */
    .site-header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(255,255,255,.94);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid #E2E8F0;
    }
    .header-inner {
      padding: 0 40px; height: 60px;
      display: flex; align-items: center; justify-content: space-between; gap: 20px;
    }
    .header-brand { display: flex; align-items: baseline; gap: 12px; }
    .header-brand h1 { font-size: 15px; font-weight: 700; letter-spacing: -.02em; }
    .header-brand p  { font-size: 12px; color: #94A3B8; }
    .week-pill {
      background: #F59E0B; color: #fff;
      padding: 6px 16px; border-radius: 100px;
      font-size: 13px; font-weight: 700; letter-spacing: -.01em;
    }

    /* ── Stats bar ───────────────────────────── */
    .stats-bar { background: #fff; border-bottom: 1px solid #E2E8F0; }
    .stats-inner { display: flex; padding: 0 40px; }
    .stat-item {
      padding: 14px 28px 14px 0; margin-right: 28px;
      border-right: 1px solid #F1F5F9;
    }
    .stat-item:last-child { border-right: none; }
    .stat-item .n { font-size: 22px; font-weight: 800; color: #D97706; letter-spacing: -.03em; }
    .stat-item .l { font-size: 11px; text-transform: uppercase; letter-spacing: .07em; color: #94A3B8; margin-top: 1px; }

    /* ── Main ────────────────────────────────── */
    .main-wrap { padding: 48px 40px 80px; }

    /* ── Team Section ────────────────────────── */
    .team-section { margin-bottom: 72px; }
    .team-section + .team-section { padding-top: 72px; border-top: 2px dashed #D1D5DB; }
    .team-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .1em; color: #94A3B8; margin-bottom: 28px; }

    /* ── Tree ────────────────────────────────── */
    .tree-container { position: relative; overflow-x: auto; overflow-y: visible; padding-bottom: 8px; }
    .tree-inner {
      position: relative;
      display: inline-flex; flex-direction: column; align-items: center;
      min-width: 100%; gap: 0; padding: 4px 20px 20px;
    }
    .tree-svg {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; overflow: visible;
    }

    /* ── Node rows ───────────────────────────── */
    .row-tl      { display: flex; justify-content: center; }
    .row-artists { display: flex; justify-content: center; gap: 8px; margin-top: 44px; flex-wrap: nowrap; }
    .row-games   { display: flex; justify-content: center; gap: 8px; margin-top: 56px; flex-wrap: nowrap; }
    .row-clients { display: flex; justify-content: center; gap: 8px; margin-top: 48px; flex-wrap: nowrap; }

    /* ── Node base ───────────────────────────── */
    .tree-node {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; border-radius: 12px; padding: 10px 12px;
      transition: transform .12s ease, box-shadow .12s ease; cursor: default;
    }
    .tree-node:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(0,0,0,.13); }

    /* Team Lead */
    .node-tl {
      background: #F59E0B; color: #fff;
      width: 260px; min-height: 72px; border-radius: 16px;
      box-shadow: 0 2px 8px rgba(245,158,11,.35);
    }
    .node-tl .node-name { font-size: 16px; font-weight: 700; letter-spacing: -.02em; line-height: 1.2; }
    .node-tl .node-role { font-size: 10px; font-weight: 500; opacity: .75; margin-top: 4px; text-transform: uppercase; letter-spacing: .07em; }

    /* Artist */
    .node-artist {
      background: #FEF3C7; color: #92400E;
      width: 120px; min-height: 46px; border-radius: 10px;
      box-shadow: 0 1px 3px rgba(0,0,0,.07);
    }
    .node-artist.game-sep { margin-left: 24px; }
    .node-artist .node-name { font-size: 10.5px; font-weight: 600; letter-spacing: -.01em; line-height: 1.3; white-space: normal; word-break: break-word; }

    /* Game */
    .node-game {
      background: #fff; color: #374151;
      width: 120px; min-height: 46px; border-radius: 10px;
      border: 1px solid #E5E7EB;
      box-shadow: 0 1px 3px rgba(0,0,0,.05);
    }
    .node-game .node-name { font-size: 10.5px; font-weight: 600; letter-spacing: -.01em; line-height: 1.3; white-space: normal; word-break: break-word; }

    /* Client */
    .node-client {
      background: #F1F5F9; color: #64748B;
      width: 120px; min-height: 40px; border-radius: 10px;
      border: 1px solid #E2E8F0;
    }
    .node-client .node-name { font-size: 10px; font-weight: 600; letter-spacing: .01em; line-height: 1.3; white-space: normal; word-break: break-word; }

    /* ── Pod sections ────────────────────────── */
    .pod-section {
      margin-bottom: 40px;
      border-radius: 20px;
      border: 1.5px solid #E2E8F0;
      background: #fff;
      box-shadow: 0 4px 28px rgba(0,0,0,.07);
    }
    .pod-header {
      display: flex; align-items: center; justify-content: center; gap: 12px;
      padding: 22px 36px;
      background: #FAFAFA;
      border-bottom: 1.5px solid #E2E8F0;
      border-radius: 20px 20px 0 0;
      position: relative;
    }
    .pod-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
    .pod-meta { text-align: center; }
    .pod-role {
      font-size: 10px; font-weight: 600; text-transform: uppercase;
      letter-spacing: .1em; color: #94A3B8; display: block; margin-bottom: 3px;
    }
    .pod-name { font-size: 20px; font-weight: 800; letter-spacing: -.03em; }
    .pod-badge {
      position: absolute; right: 36px;
      padding: 5px 14px; border-radius: 100px;
      font-size: 12px; font-weight: 600;
      color: #fff;
    }
    .pod-teams { padding: 36px 36px 4px; }
    .pod-teams .team-section { margin-bottom: 0; padding-bottom: 52px; }
    .pod-teams .team-section:last-child { padding-bottom: 8px; }
    .pod-teams .team-section + .team-section { padding-top: 52px; border-top: 1.5px dashed #E5E7EB; }

    /* ── Footer ──────────────────────────────── */
    .site-footer {
      border-top: 1px solid #E2E8F0; padding: 20px 40px;
      font-size: 12px; color: #94A3B8; display: flex; align-items: center; gap: 8px;
    }
    .footer-dot { width: 7px; height: 7px; border-radius: 50%; background: #22C55E; }
  </style>
</head>

// ──────────────────────────────────────────────────────────
//  HELPERS  — unique artists / clients per team
// ──────────────────────────────────────────────────────────
function uniqueArtists(team) {
  const out = [], seen = new Set();
  team.games.forEach(g => g.artists.forEach(a => { if (!seen.has(a)) { seen.add(a); out.push(a); } }));
  return out;
}

function uniqueClients(team) {
  const out = [], seen = new Set();
  team.games.forEach(g => { if (!seen.has(g.client)) { seen.add(g.client); out.push(g.client); } });
  return out;
}

// ──────────────────────────────────────────────────────────
//  STATS
// ──────────────────────────────────────────────────────────
function computeStats(data) {
  const artists = new Set(data.flatMap(t => t.games.flatMap(g => g.artists)));
  const games   = new Set(data.flatMap(t => t.games.map(g => g.name)));
  const clients = new Set(data.flatMap(t => t.games.map(g => g.client)).filter(c => c !== '—'));
  return { pods: pods.length, teams: data.length, artists: artists.size, games: games.size, clients: clients.size };
}

function renderStats(data) {
  const s = computeStats(data);
  document.getElementById("header-sub").textContent =
    `${s.pods} Pods · ${s.teams} Teams · ${s.artists} Artists · ${s.games} Games · ${s.clients} Clients`;
  document.getElementById("stats-inner").innerHTML = [
    ["Pods",    s.pods],
    ["Teams",   s.teams],
    ["Artists", s.artists],
    ["Games",   s.games],
    ["Clients", s.clients],
  ].map(([l, n]) => `
    <div class="stat-item">
      <div class="n">${n}</div><div class="l">${l}</div>
    </div>`).join("");
}

function renderTeam(team) {
  const tid = team.id;

  const artists = uniqueArtists(team);
  const clients = uniqueClients(team);

  const artistGameMap = new Map();
  team.games.forEach((game, gi) => game.artists.forEach(a => { if (!artistGameMap.has(a)) artistGameMap.set(a, gi); }));

  const artistNodes = artists.map((a, i) => {
    const isSep = i > 0 && artistGameMap.get(a) !== artistGameMap.get(artists[i - 1]);
    return `<div class="tree-node node-artist${isSep ? ' game-sep' : ''}" id="a-${tid}-${i}"><div class="node-name">${a}</div></div>`;
  }).join("");

  const gameNodes = team.games.map((g, i) =>
    `<div class="tree-node node-game" id="g-${tid}-${i}"><div class="node-name">${g.name}</div></div>`
  ).join("");

  const clientNodes = clients.map((c, i) =>
    `<div class="tree-node node-client" id="c-${tid}-${i}"><div class="node-name">${c}</div></div>`
  ).join("");

  return `
    <section class="team-section" id="team-${tid}">
      <div class="team-label">${team.teamName}</div>
      <div class="tree-container">
        <div class="tree-inner" id="tree-${tid}">
          <div class="row-tl">
            <div class="tree-node node-tl" id="tl-${tid}">
              <div class="node-name">${team.lead}</div>
              <div class="node-role">Creative Team Lead</div>
            </div>
          </div>
          <div class="row-artists">${artistNodes}</div>
          <div class="row-games">${gameNodes}</div>
          <div class="row-clients">${clientNodes}</div>
          <svg class="tree-svg" id="svg-${tid}"></svg>
        </div>
      </div>
    </section>`;
}

function renderAll(data) {
  renderStats(data);
  const teamMap = new Map(data.map(t => [t.id, t]));
  document.getElementById("main-content").innerHTML = pods.map(pod => {
    const teams = pod.teamIds.map(id => teamMap.get(id)).filter(Boolean);
    return `
      <div class="pod-section">
        <div class="pod-header">

        </div>
        <div class="pod-teams">${teams.map(renderTeam).join("")}</div>
      </div>`;
  }).join("");
}

// ──────────────────────────────────────────────────────────
//  SVG CONNECTORS
// ──────────────────────────────────────────────────────────
const LINE_COLOR = "#B0BEC5";
const LINE_W     = "1.5";
const CORNER_R   = 8;

function ns(tag) { return document.createElementNS("http://www.w3.org/2000/svg", tag); }

function ctr(el, base) {
  const r = el.getBoundingClientRect(), b = base.getBoundingClientRect();
  return { cx: r.left - b.left + r.width / 2, top: r.top - b.top, bottom: r.bottom - b.top };
}

function addPath(svg, d) {
  const p = ns("path");
  p.setAttribute("d", d);
  p.setAttribute("stroke", LINE_COLOR);
  p.setAttribute("stroke-width", LINE_W);
  p.setAttribute("fill", "none");
  p.setAttribute("stroke-linecap", "round");
  p.setAttribute("stroke-linejoin", "round");
  svg.appendChild(p);
}

// Open chevron arrowhead (matches Figma ARROW_LINES style)
function addArrow(svg, x, y) {
  const w = 7, h = 6;
  const pl = ns("polyline");
  pl.setAttribute("points", `${x - w},${y - h} ${x},${y} ${x + w},${y - h}`);
  pl.setAttribute("stroke", LINE_COLOR);
  pl.setAttribute("stroke-width", LINE_W);
  pl.setAttribute("fill", "none");
  pl.setAttribute("stroke-linecap", "round");
  pl.setAttribute("stroke-linejoin", "round");
  svg.appendChild(pl);
}

// Orthogonal elbow: source bottom → midY → target top, with rounded corners
function addElbow(svg, x1, y1, x2, y2, midY) {
  if (Math.abs(x1 - x2) < 1) { addPath(svg, `M ${x1} ${y1} L ${x2} ${y2}`); return; }
  if (midY === undefined) midY = (y1 + y2) / 2;
  const r = Math.min(CORNER_R, Math.abs(x2 - x1) / 2, Math.max(0, midY - y1), Math.max(0, y2 - midY));
  const sx = x2 > x1 ? 1 : -1;
  addPath(svg, `M ${x1} ${y1} L ${x1} ${midY - r} Q ${x1} ${midY} ${x1 + sx*r} ${midY} L ${x2 - sx*r} ${midY} Q ${x2} ${midY} ${x2} ${midY + r} L ${x2} ${y2}`);
}

// Orthogonal T-bus: multiple sources drop to a shared bus, then connect to one target
function addBus(svg, sources, tx, ty1, ty2) {
  const busY = ty1 + (ty2 - ty1) / 2;
  sources.forEach(sx => addPath(svg, `M ${sx} ${ty1} L ${sx} ${busY}`));
  const minX = Math.min(...sources, tx);
  const maxX = Math.max(...sources, tx);
  addPath(svg, `M ${minX} ${busY} L ${maxX} ${busY}`);
  addPath(svg, `M ${tx} ${busY} L ${tx} ${ty2}`);
}

function drawConnectors(team) {
  const tid  = team.id;
  const base = document.getElementById(`tree-${tid}`);
  const svg  = document.getElementById(`svg-${tid}`);
  svg.setAttribute("width",  base.offsetWidth);
  svg.setAttribute("height", base.offsetHeight);

  const artists = uniqueArtists(team);
  const clients = uniqueClients(team);
  if (!artists.length) return;

  const tl   = ctr(document.getElementById(`tl-${tid}`), base);
  const aPos = artists.map((_, i) => ctr(document.getElementById(`a-${tid}-${i}`), base));
  const gPos = team.games.map((_, i) => ctr(document.getElementById(`g-${tid}-${i}`), base));
  const cPos = clients.map((_, i) => ctr(document.getElementById(`c-${tid}-${i}`), base));
  const artistIdx = new Map(artists.map((a, i) => [a, i]));
  const clientIdx = new Map(clients.map((c, i) => [c, i]));

  // ── TL → T-bus → artists ──
  const tlBusY = tl.bottom + (aPos[0].top - tl.bottom) / 2;
  addPath(svg, `M ${tl.cx} ${tl.bottom} L ${tl.cx} ${tlBusY}`);
  if (aPos.length > 1) addPath(svg, `M ${aPos[0].cx} ${tlBusY} L ${aPos[aPos.length-1].cx} ${tlBusY}`);
  aPos.forEach(ap => { addPath(svg, `M ${ap.cx} ${tlBusY} L ${ap.cx} ${ap.top}`); addArrow(svg, ap.cx, ap.top); });

  // ── Compute spread departure x per artist per game ──
  // Artists with N games get N evenly-spaced departure points across their box bottom.
  // Departure points are sorted to match the left-to-right order of the target games
  // so lines don't cross each other.
  const SPREAD = 28;
  const artistGameIdxs = new Map(artists.map(a => [a, []]));
  team.games.forEach((game, gi) => game.artists.forEach(a => { if (artistGameIdxs.has(a)) artistGameIdxs.get(a).push(gi); }));

  const depX = new Map();
  artists.forEach(a => {
    const gameIdxs = artistGameIdxs.get(a);
    const N = gameIdxs.length;
    const ap = aPos[artistIdx.get(a)];
    const map = new Map();
    if (N === 1) {
      map.set(gameIdxs[0], ap.cx);
    } else {
      // Sort target games left→right so spread departure order matches game order
      const sorted = [...gameIdxs].sort((a, b) => gPos[a].cx - gPos[b].cx);
      sorted.forEach((gi, k) => {
        map.set(gi, ap.cx + (k / (N - 1) - 0.5) * 2 * SPREAD);
      });
    }
    depX.set(a, map);
  });

  // ── Artists → games (T-bus per game, each game gets its own busY level) ──
  const artBottom  = aPos[0].bottom;
  const GAME_VSTEP = 10;
  const numGames   = team.games.length;

  team.games.forEach((game, gi) => {
    const gp = gPos[gi];
    const sources = game.artists.map(a => {
      const ai = artistIdx.get(a);
      if (ai == null) return null;
      return { x: depX.get(a).get(gi), bottom: aPos[ai].bottom };
    }).filter(Boolean);
    if (!sources.length) return;

    const baseBusY = artBottom + (gp.top - artBottom) / 2;
    const busY = baseBusY + (gi - (numGames - 1) / 2) * GAME_VSTEP;

    if (sources.length === 1) {
      addElbow(svg, sources[0].x, sources[0].bottom, gp.cx, gp.top, busY);
    } else {
      sources.forEach(s => addPath(svg, `M ${s.x} ${s.bottom} L ${s.x} ${busY}`));
      const xs = [...sources.map(s => s.x), gp.cx];
      addPath(svg, `M ${Math.min(...xs)} ${busY} L ${Math.max(...xs)} ${busY}`);
      addPath(svg, `M ${gp.cx} ${busY} L ${gp.cx} ${gp.top}`);
    }
    addArrow(svg, gp.cx, gp.top);
  });

  // ── Games → clients (individual elbow per game, spread x + staggered midY) ──
  const VSTEP = 18;
  const clientGames = new Map(); // ci → [gi, ...]
  team.games.forEach((game, gi) => {
    const ci = clientIdx.get(game.client);
    if (ci == null) return;
    if (!clientGames.has(ci)) clientGames.set(ci, []);
    clientGames.get(ci).push(gi);
  });

  const gcArrX = new Map(); // gi → arrival x at client top
  const gcMidY = new Map(); // gi → midY
  clientGames.forEach((gIdxs, ci) => {
    const cp = cPos[ci];
    const y1 = gPos[0].bottom; // all game boxes share the same bottom Y
    const baseMidY = y1 + (cp.top - y1) / 2;
    const N = gIdxs.length;
    const sorted = [...gIdxs].sort((a, b) => gPos[a].cx - gPos[b].cx);
    sorted.forEach((gi, k) => {
      gcArrX.set(gi, N === 1 ? cp.cx : cp.cx + (k / (N - 1) - 0.5) * 2 * SPREAD);
      gcMidY.set(gi, baseMidY + (k - (N - 1) / 2) * VSTEP);
    });
  });

  team.games.forEach((game, gi) => {
    const ci = clientIdx.get(game.client);
    if (ci == null) return;
    const gp = gPos[gi];
    addElbow(svg, gp.cx, gp.bottom, gcArrX.get(gi), cPos[ci].top, gcMidY.get(gi));
    addArrow(svg, gcArrX.get(gi), cPos[ci].top);
  });
}

// ──────────────────────────────────────────────────────────
//  INIT
// ──────────────────────────────────────────────────────────
renderAll(orgData);

requestAnimationFrame(() => {
  orgData.forEach(drawConnectors);
});

window.addEventListener("resize", () => {
  orgData.forEach(t => { const s = document.getElementById(`svg-${t.id}`); if (s) s.innerHTML = ""; });
  orgData.forEach(drawConnectors);
});
</script>
</body>
</html>
